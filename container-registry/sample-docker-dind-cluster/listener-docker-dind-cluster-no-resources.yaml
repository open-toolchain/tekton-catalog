---
apiVersion: tekton.dev/v1
kind: TriggerTemplate
metadata:
  name: dind-cluster-no-resources
spec:
  params:
    - name: repository
      description: The git repo
    - name: branch
      description: the branch for the git repo
    - name: image-url
      description: The image url in your container registry
    - name: build-cluster
      description: name of the cluster that will host the docker dind to build docker images
    - name: pipeline-debug
      description: Pipeline debug mode. Value can be 0 or 1.
      default: "0"
    - name: properties-file
      description: >-
        name of the properties file that will be created (if needed) or updated (if existing) as an additional outcome of this task in the workspace.
        This file will contains the git related information (`GIT_URL`, `GIT_BRANCH` and `GIT_COMMIT`) and image registry-related information
        (`REGISTRY_URL`, `REGISTRY_NAMESPACE`, `REGISTRY_REGION`, `IMAGE_NAME`, `IMAGE_TAGS` and `IMAGE_MANIFEST_SHA`)
      default: ""
  resourcetemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: dind-cluster-$(uid)-pvc
      spec:
        resources:
          requests:
            storage: 5Gi
        volumeMode: Filesystem
        accessModes:
          - ReadWriteOnce
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: dind-cluster-$(uid)
      spec:
        pipelineRef:
          name: dind-cluster-no-resources
        params:
          - name: repository
            value: $(params.repository)
          - name: branch
            value: $(params.branch)
          - name: image-url
            value: $(params.image-url)
          - name: cluster-name
            value: $(params.build-cluster)
          - name: pipeline-debug
            value: $(params.pipeline-debug)
          - name: properties-file
            value: $(params.properties-file)
        workspaces:
          - name: pipeline-ws
            persistentVolumeClaim:
              claimName: dind-cluster-$(uid)-pvc
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: dind-cluster-no-resources
spec:
  params:
    - name: branch
      value: "master"
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: dind-cluster-no-resources
spec:
  triggers:
    - binding:
        name: dind-cluster-no-resources
      template:
        name: dind-cluster-no-resources
