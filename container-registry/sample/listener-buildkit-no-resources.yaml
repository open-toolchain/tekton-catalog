---
apiVersion: tekton.dev/v1
kind: TriggerTemplate
metadata:
  name: buildkit-no-resources
spec:
  params:
    - name: repository
      description: The git repo
    - name: branch
      description: the branch for the git repo
    - name: image-url
      description: The image url in your container registry
    - name: path-to-dockerfile
      description: the path to the Dockerfile that is used for the build (default to `.` meaning current directory)
      default: "."
    - name: push-to-registry
      description: option to push the built image to registry or not. Default is `true`
      default: "true"
    - name: pipeline-debug
      description: Pipeline debug mode. Value can be 0 or 1. Default to 0
      default: "0"
    - name: properties-file
      description: >-
        name of the properties file that will be created (if needed) or updated (if existing) as an additional outcome of this task in the workspace.
         This file will contains the git related information (`GIT_URL`, `GIT_BRANCH` and `GIT_COMMIT`) and image registry-related information
          (`REGISTRY_URL`, `REGISTRY_NAMESPACE`, `REGISTRY_REGION`, `IMAGE_NAME`, `IMAGE_TAGS` and `IMAGE_MANIFEST_SHA`)
      default: ""
    - name: disable-caching
      description: Disable caching layers when building images. Value can be 0 or 1. Default to 0
      default: "0"
  resourcetemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: buildkit-$(uid)-pvc
      spec:
        resources:
          requests:
            storage: 5Gi
        volumeMode: Filesystem
        accessModes:
          - ReadWriteOnce
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: buildkit-nr-$(uid)
      spec:
        pipelineRef:
          name: buildkit-no-resources
        params:
          - name: repository
            value: $(params.repository)
          - name: branch
            value: $(params.branch)
          - name: image-url
            value: $(params.image-url)
          - name: path-to-dockerfile
            value: $(params.path-to-dockerfile)
          - name: push-to-registry
            value: $(params.push-to-registry)
          - name: pipeline-debug
            value: $(params.pipeline-debug)
          - name: properties-file
            value: $(params.properties-file)
          - name: disable-caching
            value: $(params.disable-caching)
        workspaces:
          - name: pipeline-ws
            persistentVolumeClaim:
              claimName: buildkit-$(uid)-pvc
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: buildkit-no-resources
spec:
  params:
    - name: branch
      value: "master"
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: buildkit-no-resources
spec:
  triggers:
    - binding:
        name: buildkit-no-resources
      template:
        name: buildkit-no-resources
