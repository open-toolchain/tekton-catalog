---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: kubernetes-service-no-resources
spec:
  params:
    - name: cluster-region
      description: the ibmcloud region hosting the cluster (if none is found it will default to the toolchain region)
      default: ""
    - name: resource-group
      description: target resource group (name or id) for the ibmcloud login operation
    - name: cluster-name
      description: name of the cluster - required if no cluster pipeline resource provided to this task
    - name: pipeline-debug
      description: Pipeline debug mode. Value can be 0 or 1.
      default: "0"
  workspaces:
    - name: pipeline-ws
  tasks:
    - name: pipeline-0-setup-task
      taskRef:
        name: iks-fetch-config
      params:
        - name: cluster-region
          value: $(params.cluster-region)
        - name: resource-group
          value: $(params.resource-group)
        - name: cluster-name
          value: $(params.cluster-name)
        - name: cluster-pipeline-resources-directory-fallback
          value: .tekton-clusters
        - name: pipeline-debug
          value: $(params.pipeline-debug)
      workspaces:
        - name: cluster-configuration
          workspace: pipeline-ws
    - name: pipeline-1-kubectl-task
      runAfter: [pipeline-0-setup-task]
      taskRef:
        name: iks-contextual-execution
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: cluster-pipeline-resources-directory
          value: .tekton-clusters
        - name: script
          value: |
            env | sort
            echo "** Here is the kubectl version:"
            kubectl version
            echo "** Here is the kubectl cluster-info:"
            kubectl cluster-info
            echo "** Here are the kubectl namespaces:"
            kubectl get namespaces
            echo "** Here is some Continuous Delivery Tekon Pipeline support configuration properties:"
            ls -l /cd-config
            ls -l /cd-config/environment-properties
            ls -l /cd-config/secure-properties
        - name: pipeline-debug
          value: $(params.pipeline-debug)
      workspaces:
        - name: cluster-configuration
          workspace: pipeline-ws
