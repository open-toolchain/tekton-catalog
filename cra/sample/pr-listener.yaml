---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: github-pr-listener
  annotations:
    tekton.dev/displayName: "github pull-request listener"
spec:
  triggers:
    - bindings:
        - name: github-pr-binding
      template:
        name: pr-template
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: gitlab-pr-listener
  annotations:
    tekton.dev/displayName: "grit/gitlab merge-request listener"
spec:
  triggers:
    - bindings:
        - name: gitlab-pr-binding
      template:
        name: pr-template
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: github-ent-pr-listener
  annotations:
    tekton.dev/displayName: "github enterprise pull-request listener"
spec:
  triggers:
    - bindings:
        - name: github-ent-pr-binding
      template:
        name: pr-template
