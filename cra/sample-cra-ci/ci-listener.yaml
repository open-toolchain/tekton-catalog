---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: github-ci-listener
  annotations:
    tekton.dev/displayName: "github pull-request listener"
spec:
  triggers:
    - bindings:
        - name: github-ci-binding
      template:
        name: ci-template
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: gitlab-ci-listener
  annotations:
    tekton.dev/displayName: "grit/gitlab merge-request listener"
spec:
  triggers:
    - bindings:
        - name: gitlab-ci-binding
      template:
        name: ci-template
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: github-ent-ci-listener
  annotations:
    tekton.dev/displayName: "github enterprise pull-request listener"
spec:
  triggers:
    - bindings:
        - name: github-ent-ci-binding
      template:
        name: ci-template
