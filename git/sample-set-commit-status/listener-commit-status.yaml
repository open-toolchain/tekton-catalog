---
apiVersion: tekton.dev/v1
kind: TriggerTemplate
metadata:
  name: set-commit-status
spec:
  params:
    - name: repository
      description: The git repo
    - name: branch
      description: the branch for the git repo
      default: "master"
    - name: revision
      description: the git revision/commit to update the git HEAD to. Default is to mean only use the branch
      default: ""
    - name: state
      description: >-
        The state of the status. Can be one of the following: pending, success, error, or failure
      default: "success"
    - name: description
      description: A short description of the status
      default: "status from cd tekton"
    - name: pipeline-debug
      description: Pipeline debug mode. Value can be 0 or 1. Default to 0
      default: "0"
  resourcetemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pipelinerun-$(uid)-pvc
      spec:
        resources:
          requests:
            storage: 5Gi
        volumeMode: Filesystem
        accessModes:
          - ReadWriteOnce
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: pipelinerun-$(uid)
      spec:
        pipelineRef:
          name: set-commit-status
        params:
          - name: repository
            value: $(params.repository)
          - name: branch
            value: $(params.branch)
          - name: revision
            value: $(params.revision)
          - name: state
            value: $(params.state)
          - name: description
            value: $(params.description)
          - name: pipeline-debug
            value: $(params.pipeline-debug)
        workspaces:
          - name: pipeline-ws
            persistentVolumeClaim:
              claimName: pipelinerun-$(uid)-pvc
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: github-commit
spec:
  params:
    - name: repository
      value: "$(event.repository.url)"
    - name: branch
      value: "$(event.ref)"
    - name: revision
      value: "$(event.head_commit.id)"
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: github-commit
spec:
  triggers:
    - binding:
        name: github-commit
      template:
        name: set-commit-status
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: gitlab-commit
spec:
  params:
    - name: repository
      value: "$(event.repository.git_http_url)"
    - name: branch
      value: "$(event.ref)"
    - name: revision
      value: "$(event.checkout_sha)"
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: gitlab-commit
spec:
  triggers:
    - binding:
        name: gitlab-commit
      template:
        name: set-commit-status
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: bitbucket-commit
spec:
  params:
    - name: repository
      value: "$(event.repository.links.html.href)"
    - name: branch
      value: "$(event.push.changes[0].new.name)"
    - name: revision
      value: "$(event.push.changes[0].new.target.hash)"
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: bitbucket-commit
spec:
  triggers:
    - binding:
        name: bitbucket-commit
      template:
        name: set-commit-status
